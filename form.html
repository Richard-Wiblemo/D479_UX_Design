<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="./styles.css" />
</head>
<body>
    <div class="container-header">
        <h1>Contact Us</h1>
    </div>
    <div class="container-nav">
        <nav>
            <a href="./index.html">Home</a>
            <a href="./about.html">About the Island</a>
            <a href="./amenities.html">Amenities</a>
            <a href="./entertainment.html">Entertainment</a>
            <a href="./faq.html">FAQ</a>
            <a href="./form.html">Contact Us</a>
        </nav>
    </div>
    <div class="middle-section">
        <div class="container-section">
            <section>
                <img src="./Images/simon-spring-qqvlV5WOnls-unsplash.jpg" alt="Colorado state seal">
                <div class="container-form">
                    <form action="" id="userForm">
                        <div class="form-cell">
                            <label for="">First Name: </label>
                            <input type="text">
                        </div>
                        <div class="form-cell">
                            <label for="">Last Name: </label>
                            <input type="text">
                        </div>
                        <div class="form-cell">
                            <label for="email">Email: </label>
                            <input type="text" id="email" name="email">
                        </div>
                        <div class="form-cell">
                            <label for="confirmEmail">Confirm Email: </label>
                            <input type="text" id="confirmEmail" name="confirmEmail">
                        </div>
                        <div class="form-cell">
                            <label for="">Ask a Question: </label>
                            <textarea name="" id="" placeholder="Type questions here..."></textarea>
                        </div>
                        <input type="submit" name="submit" id="submit">
                    </form>
                </div>
            </section>
        </div>
    </div>
    <script src="form.js"></script>
</body>
<footer>
    Photos via - <a href="https://unsplash.com/" target="_blank">Unsplash</a>
</footer>
</html>
